name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B -e 2>&1 | tee /tmp/maven.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-log
          path: /tmp/maven.log
          retention-days: 7

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: r.stonecutter-1.3.0
          path: target/r.stonecutter-1.3.0.jar
          retention-days: 30
