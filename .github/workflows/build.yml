name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn package -B --no-transfer-progress

      - name: List target
        run: ls -lh target/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: r.stonecutter-1.3.0
          path: target/*.jar
          if-no-files-found: error
          retention-days: 30
