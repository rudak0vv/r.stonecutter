name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download deps and check
        run: |
          mvn dependency:resolve -B --no-transfer-progress > /tmp/deps.log 2>&1 || true
          # Проверяем что скачалось
          find ~/.m2 -name "paper-api*.jar" 2>/dev/null | head -5 >> /tmp/deps.log
          # Список пакетов в jar
          JAR=$(find ~/.m2 -name "paper-api*.jar" 2>/dev/null | head -1)
          if [ -n "$JAR" ]; then
            echo "=== JAR: $JAR ===" >> /tmp/deps.log
            unzip -l "$JAR" | grep -E "bukkit/art|PaintingMeta|bukkit/art" | head -20 >> /tmp/deps.log
          fi
          cat /tmp/deps.log

      - name: Build
        run: mvn package -B --no-transfer-progress > /tmp/build.log 2>&1 || true

      - name: Commit logs
        run: |
          cat /tmp/deps.log /tmp/build.log > build.log
          git config user.email "ci@github" && git config user.name "CI"
          git add build.log && git commit -m "ci: logs" && git push || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r.stonecutter
          path: "target/*.jar"
          if-no-files-found: warn
