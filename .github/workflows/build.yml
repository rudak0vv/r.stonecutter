name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn package -B -q --no-transfer-progress

      - name: Commit JAR to repo
        run: |
          cp target/r.stonecutter-1.3.0.jar r.stonecutter-1.3.0.jar
          git config user.email "ci@github"
          git config user.name "CI"
          git add r.stonecutter-1.3.0.jar
          git commit -m "build: add compiled JAR v1.3.0"
          git push
