name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and capture log
        run: mvn package -B -e --no-transfer-progress > /tmp/build.log 2>&1 || true

      - name: Commit log to repo
        run: |
          cp /tmp/build.log build.log
          git config user.email "ci@github"
          git config user.name "CI"
          git add build.log
          git commit -m "ci: build log" || true
          git push || true

      - name: Upload JAR
        run: |
          ls target/ && cp target/*.jar . || true

      - uses: actions/upload-artifact@v4
        with:
          name: r.stonecutter-1.3.0
          path: "*.jar"
          if-no-files-found: warn
