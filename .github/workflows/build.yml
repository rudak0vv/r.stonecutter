name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Inspect paper-api and build
        run: |
          mvn dependency:resolve -B -q --no-transfer-progress || true
          JAR=$(find ~/.m2 -name "paper-api-1.21.4*.jar" | grep -v "sources\|javadoc" | head -1)
          echo "=== paper-api JAR: $JAR ===" > /tmp/build.log
          if [ -n "$JAR" ]; then
            echo "=== art/paint classes ===" >> /tmp/build.log
            unzip -l "$JAR" | grep -iE "art|paint|Art|Paint" >> /tmp/build.log || echo "none found" >> /tmp/build.log
            echo "=== org/bukkit/ top packages ===" >> /tmp/build.log
            unzip -l "$JAR" | grep "org/bukkit/" | sed 's|.*/org/bukkit/\([^/]*\)/.*|org/bukkit/\1|' | sort -u | head -30 >> /tmp/build.log
          fi
          mvn package -B --no-transfer-progress >> /tmp/build.log 2>&1 || true
          cat /tmp/build.log

      - name: Commit log
        run: |
          cp /tmp/build.log build.log
          git config user.email "ci@github" && git config user.name "CI"
          git add build.log && git commit -m "ci: build log" && git push || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r.stonecutter
          path: "target/*.jar"
          if-no-files-found: warn
