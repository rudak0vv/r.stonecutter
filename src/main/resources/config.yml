# ============================================================
#  r.stonecutter — конфиг рецептов
#  Формат рецепта:
#    enabled: true/false       — включить/выключить рецепт
#    input: "namespace:id"     — предмет на входе
#    output: "namespace:id"    — предмет на выходе
#    amount: N                 — кол-во выходных предметов
#    input-count: N            — (необязательно) сколько входных предметов нужно (по умолч. 1)
#    tag: "namespace:tag"      — (вместо input) принимать всю тег-группу предметов
#    nbt:                      — (необязательно) NBT/компонент для конкретизации входа
#      component: "key"
#      value: "val"
# ============================================================

recipes:

  # ===========================================================
  #  ДЕРЕВО — ДОСКИ
  #  Из 1 доски: 2 плиты / 1 ступенька / 2 палки
  # ===========================================================

  planks_to_slab:
    enabled: true
    tag: "minecraft:planks"
    output: "minecraft:oak_slab"       # будет заменён на правильный тип в коде
    amount: 2
    dynamic_wood: true
    wood_target: "slab"

  planks_to_stairs:
    enabled: true
    tag: "minecraft:planks"
    output: "minecraft:oak_stairs"
    amount: 1
    dynamic_wood: true
    wood_target: "stairs"

  planks_to_stick:
    enabled: true
    tag: "minecraft:planks"
    output: "minecraft:stick"
    amount: 2

  # ===========================================================
  #  ДЕРЕВО — БРЁВНА (любые, включая stripped)
