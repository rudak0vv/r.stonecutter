name: Build JAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        id: build
        run: |
          mvn package -B -e --no-transfer-progress 2>&1 | tee /tmp/maven.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post log to job summary
        if: always()
        run: |
          echo "## Maven Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/maven.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: r.stonecutter-1.3.0
          path: target/r.stonecutter-1.3.0.jar
          retention-days: 30
